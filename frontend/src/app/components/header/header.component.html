<header class="dashboard-header">
  <div class="header-content">
    <div class="header-title">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </div>
      <div class="title-text">
        <h1>לוח בקרה - נדל"ן ומשכנתאות</h1>
        <p class="subtitle">מעקב אחר מחירי דירות וריביות בישראל</p>
      </div>
    </div>

    <div class="header-controls">
      <!-- Market Type Toggle -->
      <div class="market-toggle">
        <button
          class="market-option"
          [class.active]="(marketType$ | async) === 'new-dwellings'"
          (click)="setMarketType('new-dwellings')">
          דירות חדשות
        </button>
        <button
          class="market-option"
          [class.active]="(marketType$ | async) === 'general'"
          (click)="setMarketType('general')">
          שוק כללי
        </button>
      </div>

      <!-- Dark Mode Toggle -->
      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="themeService.isDarkMode() ? 'מעבר למצב בהיר' : 'מעבר למצב כהה'">
        @if (themeService.isDarkMode()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        }
      </button>
    </div>
  </div>
</header>
