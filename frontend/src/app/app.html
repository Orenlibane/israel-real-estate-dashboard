<div class="app-container">
  <app-header />

  <main class="main-content">
    <div class="container">
      @if (error$ | async; as error) {
        <div class="error-message">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span>{{ error }}</span>
          <button class="btn btn-secondary" (click)="retry()">נסה שוב</button>
        </div>
      }

      <!-- Filters Section -->
      <app-filters />

      <!-- KPIs Overview -->
      <app-kpi-section />

      <!-- Sales Statistics -->
      <app-sales-stats />

      <!-- Regional Analysis -->
      <app-regional-chart />

      <!-- Price & Interest Correlation -->
      <app-correlation-chart />

      <!-- Historical Data Table -->
      <app-data-table />
    </div>
  </main>

  <footer class="app-footer">
    <div class="container">
      <p>מקורות מידע: הלשכה המרכזית לסטטיסטיקה (למ"ס) | בנק ישראל</p>
      <p class="disclaimer">הנתונים מוצגים למטרות מידע בלבד ואינם מהווים ייעוץ השקעות</p>
    </div>
  </footer>
</div>
